<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>警察サイコロ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Yu Gothic UI', 'Meiryo', sans-serif;
  background: #0e1e36;
  color: #dde8f5;
  min-height: 100vh;
  padding-top: 60px; /* topbar height */
  font-size: 16px;
}

/* ── Fixed top bar ─────────────────────────────────────────────────────────── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: #0a1628;
  border-bottom: 2px solid #1e3050;
  display: flex;
  align-items: center;
  z-index: 100;
  padding: 0 10px;
}
.tb-left  { width: 90px; display: flex; align-items: center; }
.tb-right { width: 120px; display: flex; align-items: center; justify-content: flex-end; }
.tb-center { flex: 1; text-align: center; }
.tb-age { font-size: 1.25em; color: #fff; font-weight: bold; }
.tb-promo-badge {
  display: inline-block;
  background: #b8860b;
  color: #fff;
  font-size: 0.58em;
  padding: 2px 7px;
  border-radius: 12px;
  margin-left: 6px;
  vertical-align: middle;
  animation: pulse 1s infinite alternate;
}
@keyframes pulse {
  from { opacity: 0.7; }
  to   { opacity: 1; box-shadow: 0 0 8px #ffd700; }
}

.tb-btn {
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  font-family: inherit;
  font-size: 0.85em;
  font-weight: bold;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
}
.tb-action  { background: #ffd700; color: #0e1e36; }
.tb-action:active  { background: #ffe840; }
.tb-promo   { background: #8b4513; color: #ffe0b0; }
.tb-promo:active   { background: #a0522d; }
.tb-next    { background: #2a6a2a; color: #ccffcc; font-size: 0.8em; }
.tb-next:active    { background: #3a8a3a; }
.tb-retire  { background: transparent; color: #cc8888; border: 1px solid #664444; font-size: 0.8em; }
.tb-retire:active  { background: #3a2020; }
.tb-cpu-label { font-size: 0.75em; color: #88cc66; }

/* ── Page content ──────────────────────────────────────────────────────────── */
#page {
  padding: 14px 12px;
  max-width: 520px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  font-size: 1.7em;
  color: #ffd700;
  margin-bottom: 2px;
  letter-spacing: 3px;
  text-shadow: 0 0 14px rgba(255,215,0,0.4);
}
.subtitle {
  text-align: center;
  color: #7799bb;
  margin-bottom: 16px;
  font-size: 0.8em;
  letter-spacing: 1px;
}

/* ── Event notices ─────────────────────────────────────────────────────────── */
.event-notice {
  background: #2a1a4a;
  border: 1px solid #7744aa;
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 0.95em;
  color: #cc99ff;
  line-height: 1.5;
}
.promo-notice {
  background: #2a1e0a;
  border-color: #b8860b;
  color: #ffd060;
}

/* ── Player cards: 縦並び ──────────────────────────────────────────────────── */
.players-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
}

.player-card {
  background: #16293f;
  border: 2px solid #2a4060;
  border-radius: 12px;
  padding: 14px;
  transition: border-color 0.3s, box-shadow 0.3s;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.player-card.active {
  border-color: #ffd700;
  box-shadow: 0 0 12px rgba(255,215,0,0.25);
}

.card-left { flex: 1; min-width: 0; }
.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }

.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.card-name { font-size: 1.1em; font-weight: bold; color: #ffd700; }
.badge-player { background: #1a4a7a; color: #7acfff; font-size: 0.65em; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.badge-cpu    { background: #2a3a20; color: #88cc66; font-size: 0.65em; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }

.rank-label { font-size: 0.75em; color: #7799bb; margin-bottom: 2px; }
.rank-value { font-size: 1.15em; font-weight: bold; color: #aaddff; margin-bottom: 6px; }

.rank-stars { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }
.rank-star { width: 9px; height: 9px; border-radius: 50%; background: #2a4060; }
.rank-star.filled { background: #ffd700; }

.dep-label { font-size: 0.75em; color: #7799bb; margin-bottom: 2px; }
.dep-value { font-size: 0.95em; color: #dde8f5; }
.dep-value.special { color: #ff88ff; font-weight: bold; }

.btn-resume {
  padding: 7px 12px;
  background: #1e3a5a;
  border: 1px solid #3a6090;
  border-radius: 8px;
  color: #88bbdd;
  font-size: 0.85em;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  touch-action: manipulation;
}
.btn-resume:active { background: #2a4e6e; }

.retired-notice {
  background: #2a1010;
  border: 2px solid #884444;
  border-radius: 10px;
  padding: 16px;
  color: #ffaaaa;
  font-size: 1.1em;
  margin-bottom: 14px;
  text-align: center;
}

/* ── Restart button ────────────────────────────────────────────────────────── */
.btn-full {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 1.05em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 12px;
  touch-action: manipulation;
}
.btn-restart-full { background: #3a3a6a; color: #aaaaff; }
.btn-restart-full:active { background: #4a4a8a; }

/* ── Log ───────────────────────────────────────────────────────────────────── */
.log-title { font-size: 0.85em; color: #7799bb; margin-bottom: 6px; letter-spacing: 1px; }
.log-box {
  background: #0a1628;
  border: 1px solid #1e3050;
  border-radius: 10px;
  padding: 12px;
  max-height: 160px;
  overflow-y: auto;
  font-size: 0.88em;
  line-height: 1.9;
}
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-track { background: #0a1628; }
.log-box::-webkit-scrollbar-thumb { background: #2a4060; border-radius: 2px; }

.log-year     { color: #ffd700; font-weight: bold; }
.log-player   { color: #7acfff; font-weight: bold; }
.log-cpu      { color: #88cc66; }
.log-promo    { color: #ffaa44; font-weight: bold; }
.log-special  { color: #ff88ff; font-weight: bold; }
.log-no-promo { color: #886644; }

/* ── Dice dialog overlay ───────────────────────────────────────────────────── */
#dice-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
#dice-dialog {
  width: 80vw;
  height: 80vh;
  max-width: 400px;
  max-height: 560px;
  background: #16293f;
  border: 2px solid #3a6090;
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 28px 20px;
}
.dlg-label {
  font-size: 1.3em;
  color: #aacce8;
  text-align: center;
  font-weight: bold;
  line-height: 1.4;
}
.dlg-label.promo { color: #ffd700; }
.dlg-label.cpu   { color: #88cc66; }

.dice {
  width: 130px; height: 130px;
  background: #fff;
  border-radius: 22px;
  font-size: 5.2em;
  line-height: 130px;
  text-align: center;
  color: #0e1e36;
  box-shadow: 4px 6px 20px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.4);
  user-select: none;
}
.dice.spinning {
  animation: diceshake 0.12s ease-in-out infinite alternate;
  box-shadow: 0 0 28px rgba(255,215,0,0.6), 4px 6px 20px rgba(0,0,0,0.7);
}
@keyframes diceshake {
  from { transform: rotate(-10deg) scale(1.08); }
  to   { transform: rotate(10deg)  scale(0.95); }
}
.dice-stop-anim { animation: dicestop 0.35s ease-out forwards; }
@keyframes dicestop {
  0%   { transform: rotate(-6deg) scale(1.05); }
  40%  { transform: rotate(4deg)  scale(0.97); }
  70%  { transform: rotate(-2deg) scale(1.01); }
  100% { transform: rotate(0deg)  scale(1);    }
}

.dlg-result {
  font-size: 1.2em;
  color: #aacce8;
  min-height: 1.5em;
  text-align: center;
}
.dlg-result strong { color: #fff; font-size: 1.25em; }
.dlg-dep { display: block; margin-top: 8px; font-size: 1.05em; color: #dde8f5; }
.dlg-dep.special { color: #ff88ff; font-weight: bold; }

.btn-stop {
  width: 200px;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: #cc3333;
  color: #fff;
  font-size: 1.25em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  touch-action: manipulation;
}
.btn-stop:active { background: #ee4444; transform: scale(0.97); }

/* ── Ending screen ─────────────────────────────────────────────────────────── */
.ending { text-align: center; padding: 8px 0 20px; }
.ending h2 { font-size: 1.8em; color: #ffd700; margin-bottom: 6px; }
.end-sub { color: #7799bb; margin-bottom: 20px; font-size: 0.95em; }

.result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.result-card {
  background: #16293f;
  border: 2px solid #2a4060;
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.result-card.winner { border-color: #ffd700; box-shadow: 0 0 14px rgba(255,215,0,0.3); }
.result-place { font-size: 2em; flex-shrink: 0; }
.result-info { flex: 1; text-align: left; }
.result-name  { font-size: 1em; color: #ffd700; margin-bottom: 3px; }
.result-rank  { font-size: 1.2em; font-weight: bold; color: #aaddff; margin-bottom: 2px; }
.result-dep   { font-size: 0.85em; color: #7799bb; }
.final-rank-msg { color: #aacce8; margin-bottom: 20px; font-size: 1em; }
.final-rank-msg strong { color: #ffd700; font-size: 1.15em; }

.resume-btns { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.btn-resume-end {
  display: block;
  padding: 12px;
  background: #1e3a5a;
  border: 1px solid #3a6090;
  border-radius: 8px;
  color: #88bbdd;
  font-size: 0.95em;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
}
.btn-resume-end:active { background: #2a4e6e; }
</style>
</head>
<body>

<!-- Fixed topbar -->
<div id="topbar"></div>

<!-- Main scrollable content -->
<div id="page">
  <h1>警察サイコロ</h1>
  <div class="subtitle">— ノンキャリア警察官 出世すごろく —</div>
  <div id="app"></div>
</div>

<!-- Dice dialog overlay (static, always in DOM) -->
<div id="dice-overlay" style="display:none">
  <div id="dice-dialog">
    <div id="dlg-label" class="dlg-label"></div>
    <div class="dice" id="main-dice">🎲</div>
    <div id="dlg-result" class="dlg-result"></div>
    <div id="dlg-btns"></div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const RANKS = ['巡査','巡査部長','警部補','警部','警視','警視正','警視長','警視監','警視総監'];

const DEPLOYMENTS_NORMAL = [
  '交番','生活安全課','少年課','刑事課','機動捜査隊',
  '捜査一課','捜査二課','捜査三課','捜査四課',
  '地域課','交通課','交通機動隊','高速道路交通警察隊',
  '警備課','機動隊','鑑識課','科学捜査研究所',
  '留置管理課','通信指令室','外事課','公安課',
  '薬物銃器対策課','組織犯罪対策課','サイバー犯罪対策課',
  '人身安全対策課','防犯課','警務課','警察学校',
  '水上警察署','空港警察署',
];
const DEPLOYMENTS_GOGO = ['警護課一係','警護課二係','警護課三係','警護課四係'];
const DICE_FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const START_AGE = 22, RETIRE_AGE = 72;

// ── Helpers ──────────────────────────────────────────────────────────────────
function roll() { return Math.floor(Math.random() * 6) + 1; }
function isPromotionYear(age) { return age > START_AGE && (age - START_AGE) % 5 === 0; }
function isGogoYear(age) { return age === 35; }

function pickDeployment(dice, age) {
  if (isGogoYear(age) && (dice === 2 || dice === 5))
    return { dep: DEPLOYMENTS_GOGO[Math.floor(Math.random() * DEPLOYMENTS_GOGO.length)], special: true };
  return { dep: DEPLOYMENTS_NORMAL[Math.floor(Math.random() * DEPLOYMENTS_NORMAL.length)], special: false };
}

function rankStars(rankIdx) {
  let h = '<div class="rank-stars">';
  for (let i = 0; i < RANKS.length; i++)
    h += `<div class="rank-star${i <= rankIdx ? ' filled' : ''}"></div>`;
  return h + '</div>';
}

// ── Dice animation (operates on static #main-dice in overlay) ────────────────
let _rollingTimer = null;

function diceStartSpin() {
  if (_rollingTimer) return;
  _rollingTimer = setInterval(() => {
    const el = document.getElementById('main-dice');
    if (el) el.textContent = DICE_FACES[Math.floor(Math.random() * 6) + 1];
  }, 70);
  const el = document.getElementById('main-dice');
  if (el) el.classList.add('spinning');
}

function diceStopSpin(finalVal) {
  clearInterval(_rollingTimer);
  _rollingTimer = null;
  const el = document.getElementById('main-dice');
  if (el) {
    el.classList.remove('spinning');
    el.classList.add('dice-stop-anim');
    el.textContent = DICE_FACES[finalVal];
    setTimeout(() => { if (el) el.classList.remove('dice-stop-anim'); }, 400);
  }
}

// ── State ────────────────────────────────────────────────────────────────────
let S;
function initState() {
  S = {
    age: START_AGE,
    players: [
      { name: 'あなた', rank: 0, dep: '交番', isPlayer: true,  depSpecial: false, history: [], customName: null },
      { name: 'CPU 1',  rank: 0, dep: '交番', isPlayer: false, depSpecial: false, history: [], customName: null },
      { name: 'CPU 2',  rank: 0, dep: '交番', isPlayer: false, depSpecial: false, history: [], customName: null },
    ],
    phase: 'dep_idle',
    diceVal: null,
    cpuIdx: 0,
    cpuRoll: 'dep',
    cpuLabel: '',
    log: [],
    retired: false,
    gameOver: false,
  };
}

function addLog(html) {
  S.log.unshift(html);
  if (S.log.length > 80) S.log.pop();
}

function pushHistory(player, promoted) {
  player.history.push({
    age: S.age, dep: player.dep, depSpecial: player.depSpecial,
    rank: player.rank, promoted,
  });
}

// ── Resume ───────────────────────────────────────────────────────────────────
function showResume(idx) {
  const p = S.players[idx];
  if (p.customName === null) {
    const defaultName = p.isPlayer ? 'あなた' : p.name;
    const input = prompt('名前を入力してください', defaultName);
    if (input === null) return;
    p.customName = input.trim() || defaultName;
    render();
  }
  const win = window.open('', '_blank', 'width=720,height=620,scrollbars=yes,resizable=yes');
  if (!win) { alert('ポップアップがブロックされました。許可してください。'); return; }
  win.document.write(generateResumeHTML(p));
  win.document.close();
}

function generateResumeHTML(p) {
  const name = p.customName || p.name;
  const entryYear = 2000 + START_AGE;
  let rows = '';
  if (p.history.length === 0) {
    rows = `<tr><td colspan="4" style="text-align:center;color:#999;padding:20px;">まだ履歴はありません</td></tr>`;
  } else {
    p.history.forEach(h => {
      const yr = entryYear + (h.age - START_AGE);
      let bikou = '';
      if (h.promoted === true)  bikou = '<span style="color:#c00;font-weight:bold;">昇進</span>';
      if (h.promoted === false) bikou = '昇進ならず';
      if (h.depSpecial) bikou = (bikou ? bikou + '　' : '') + '<span style="color:#900;font-weight:bold;">警護課配属</span>';
      rows += `<tr>
        <td style="text-align:center;">${yr}年（${h.age}歳）</td>
        <td>${h.dep}</td>
        <td style="text-align:center;">${RANKS[h.rank]}</td>
        <td>${bikou}</td>
      </tr>`;
    });
  }
  return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>履歴書 - ${name}</title>
<style>
  body{font-family:'Yu Mincho','Times New Roman',serif;background:#fdfaf5;color:#222;padding:30px 40px;font-size:15px;}
  h1{text-align:center;font-size:2em;letter-spacing:8px;margin-bottom:30px;border-bottom:3px double #333;padding-bottom:12px;}
  table{width:100%;border-collapse:collapse;margin-bottom:28px;}
  th{background:#3a3a5a;color:#fff;padding:8px 12px;font-weight:normal;text-align:left;}
  td{border:1px solid #ccc;padding:8px 12px;}
  tr:nth-child(even) td{background:#f5f0e8;}
  .info th{width:130px;}
  h2{font-size:1.2em;letter-spacing:3px;margin-bottom:10px;border-left:4px solid #3a3a5a;padding-left:10px;}
  .footer{margin-top:28px;text-align:right;color:#999;font-size:0.85em;}
</style></head><body>
<h1>履 歴 書</h1>
<table class="info">
  <tr><th>氏名</th><td><strong style="font-size:1.1em;">${name}</strong></td></tr>
  <tr><th>入職年齢</th><td>${START_AGE}歳（大学卒業・ノンキャリア採用）</td></tr>
  <tr><th>現在の年齢</th><td>${S.age}歳</td></tr>
  <tr><th>現在の職位</th><td>${RANKS[p.rank]}</td></tr>
  <tr><th>現在の配属先</th><td>${p.dep}</td></tr>
</table>
<h2>職 歴</h2>
<table><thead><tr>
  <th style="width:150px;">年度</th><th>配属先</th>
  <th style="width:110px;">職位</th><th style="width:130px;">備考</th>
</tr></thead><tbody>${rows}</tbody></table>
<div class="footer">警察サイコロ — 履歴書</div>
</body></html>`;
}

// ── Retirement ────────────────────────────────────────────────────────────────
function retirePlayer() {
  if (!confirm('本当に退職しますか？\nキャリアを終了して、このまま退職します。')) return;
  S.retired = true;
  render();
}

// ── Player click ──────────────────────────────────────────────────────────────
function playerClickDice() {
  if (S.phase === 'dep_idle') {
    S.phase = 'dep_rolling';
    S.diceVal = null;
    render();
    diceStartSpin();

  } else if (S.phase === 'dep_rolling' && S.diceVal === null) {
    const d = roll();
    diceStopSpin(d);
    S.diceVal = d;
    const p = S.players[0];
    const { dep, special } = pickDeployment(d, S.age);
    p.dep = dep; p.depSpecial = special;
    let log = `<span class="log-year">${S.age}歳</span> <span class="log-player">あなた</span>: 🎲${d} → `;
    log += special ? `<span class="log-special">【警護課配属！】${dep}</span>` : dep;
    addLog(log);
    if (isPromotionYear(S.age) && p.rank < RANKS.length - 1) {
      S.phase = 'promo_idle';
      render();
    } else {
      pushHistory(p, null);
      render();
      setTimeout(startCPUSequence, 500);
    }

  } else if (S.phase === 'promo_idle') {
    S.phase = 'promo_rolling';
    S.diceVal = null;
    render();
    diceStartSpin();

  } else if (S.phase === 'promo_rolling' && S.diceVal === null) {
    const d = roll();
    diceStopSpin(d);
    S.diceVal = d;
    const p = S.players[0];
    let promoted = false;
    if (d <= 3 && p.rank < RANKS.length - 1) {
      p.rank++; promoted = true;
      addLog(`<span class="log-year">${S.age}歳</span> <span class="log-player">あなた</span>: 🎲${d} → <span class="log-promo">昇進！ → ${RANKS[p.rank]}</span>`);
    } else if (p.rank >= RANKS.length - 1) {
      addLog(`<span class="log-year">${S.age}歳</span> <span class="log-player">あなた</span>: 🎲${d} → 既に最高職位`);
      promoted = null;
    } else {
      addLog(`<span class="log-year">${S.age}歳</span> <span class="log-player">あなた</span>: 🎲${d} → <span class="log-no-promo">昇進ならず</span>`);
    }
    pushHistory(p, promoted);
    render();
    setTimeout(startCPUSequence, 500);
  }
}

// ── CPU sequence ──────────────────────────────────────────────────────────────
function startCPUSequence() {
  S.phase = 'cpu_seq';
  S.cpuIdx = 0;
  S.cpuRoll = 'dep';
  tickCPU();
}

function tickCPU() {
  if (S.cpuIdx >= S.players.length - 1) {
    S.phase = 'wait_next';
    S.cpuLabel = '';
    S.diceVal = null;
    render();
    return;
  }
  const cpu = S.players[S.cpuIdx + 1];
  S.cpuLabel = S.cpuRoll === 'dep'
    ? `${cpu.name}\n配属先サイコロ`
    : `${cpu.name}\n昇進サイコロ`;
  S.diceVal = null;
  render();
  diceStartSpin();

  setTimeout(() => {
    const d = roll();
    diceStopSpin(d);
    S.diceVal = d;

    if (S.cpuRoll === 'dep') {
      const { dep, special } = pickDeployment(d, S.age);
      cpu.dep = dep; cpu.depSpecial = special;
      let log = `<span class="log-year">${S.age}歳</span> <span class="log-cpu">${cpu.name}</span>: 🎲${d} → `;
      log += special ? `<span class="log-special">【警護課配属！】${dep}</span>` : dep;
      addLog(log);
      render();
      if (isPromotionYear(S.age) && cpu.rank < RANKS.length - 1) {
        S.cpuRoll = 'promo';
        setTimeout(tickCPU, 700);
      } else {
        pushHistory(cpu, null);
        S.cpuIdx++; S.cpuRoll = 'dep';
        setTimeout(tickCPU, 600);
      }
    } else {
      let promoted = false;
      if (d <= 3 && cpu.rank < RANKS.length - 1) {
        cpu.rank++; promoted = true;
        addLog(`<span class="log-year">${S.age}歳</span> <span class="log-cpu">${cpu.name}</span>: 🎲${d} → <span class="log-promo">昇進！ → ${RANKS[cpu.rank]}</span>`);
      } else if (cpu.rank >= RANKS.length - 1) {
        addLog(`<span class="log-year">${S.age}歳</span> <span class="log-cpu">${cpu.name}</span>: 🎲${d} → 既に最高職位`);
        promoted = null;
      } else {
        addLog(`<span class="log-year">${S.age}歳</span> <span class="log-cpu">${cpu.name}</span>: 🎲${d} → <span class="log-no-promo">昇進ならず</span>`);
      }
      pushHistory(cpu, promoted);
      render();
      S.cpuIdx++; S.cpuRoll = 'dep';
      setTimeout(tickCPU, 600);
    }
  }, 1200);
}

// ── Year / restart ────────────────────────────────────────────────────────────
function nextYear() {
  S.age++;
  S.diceVal = null;
  S.phase = 'dep_idle';
  S.cpuLabel = '';
  if (S.age >= RETIRE_AGE) S.gameOver = true;
  render();
}

function restart() {
  clearInterval(_rollingTimer);
  _rollingTimer = null;
  initState();
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  // Safety: clear any stray interval (dice element is persistent so this is safe)
  clearInterval(_rollingTimer);
  _rollingTimer = null;

  if (S.gameOver) {
    buildTopbar();
    document.getElementById('app').innerHTML = buildEnding();
    document.getElementById('dice-overlay').style.display = 'none';
    return;
  }

  buildTopbar();
  document.getElementById('app').innerHTML = buildMain();
  updateDialog();
}

function buildTopbar() {
  const tb = document.getElementById('topbar');
  if (S.gameOver) {
    tb.innerHTML = `<div class="tb-left"></div>
      <div class="tb-center"><span class="tb-age" style="font-size:1em;color:#ffd700;">警察サイコロ — 定年退職</span></div>
      <div class="tb-right"></div>`;
    return;
  }

  const promYear = isPromotionYear(S.age);

  // Left: retire button
  const leftHTML = (!S.retired && S.phase === 'dep_idle')
    ? `<button class="tb-btn tb-retire" onclick="retirePlayer()">🚪 退職</button>`
    : '';

  // Center: age
  let centerHTML = `<span class="tb-age">${S.age}歳</span>`;
  if (promYear && !S.retired) centerHTML += `<span class="tb-promo-badge">★昇進</span>`;

  // Right: action button
  let rightHTML = '';
  if (!S.retired) {
    if      (S.phase === 'dep_idle')   rightHTML = `<button class="tb-btn tb-action" onclick="playerClickDice()">🎲 サイコロ</button>`;
    else if (S.phase === 'promo_idle') rightHTML = `<button class="tb-btn tb-promo"  onclick="playerClickDice()">🎲 昇進サイコロ</button>`;
    else if (S.phase === 'wait_next')  rightHTML = `<button class="tb-btn tb-next"   onclick="nextYear()">次の年 →</button>`;
    else if (S.phase === 'cpu_seq')    rightHTML = `<span class="tb-cpu-label">CPU中…</span>`;
  }

  tb.innerHTML = `
    <div class="tb-left">${leftHTML}</div>
    <div class="tb-center">${centerHTML}</div>
    <div class="tb-right">${rightHTML}</div>`;
}

function buildMain() {
  if (S.retired) {
    return buildPlayerCards()
      + `<div class="retired-notice">🚪 退職しました。お疲れ様でした。</div>`
      + `<button class="btn-full btn-restart-full" onclick="restart()">もう一度プレイ</button>`
      + buildLog();
  }

  let html = '';
  const gogoYear = isGogoYear(S.age);
  if (gogoYear && (S.phase === 'dep_idle' || S.phase === 'dep_rolling'))
    html += `<div class="event-notice">🌟 35歳イベント：警護課推薦！ <strong>2か5</strong> が出ると警護課に配属されます</div>`;
  if (S.phase === 'promo_idle')
    html += `<div class="event-notice promo-notice">🏅 昇進チャンス！ 右上のボタンでサイコロを振ってください（1〜3で昇進）</div>`;

  html += buildPlayerCards();
  html += buildLog();
  return html;
}

function buildPlayerCards() {
  const activeIdx = S.phase === 'cpu_seq' ? S.cpuIdx + 1
    : ['dep_idle','dep_rolling','promo_idle','promo_rolling'].includes(S.phase) ? 0 : -1;

  let html = '<div class="players-grid">';
  S.players.forEach((p, i) => {
    const name = p.customName !== null ? p.customName : p.name;
    html += `<div class="player-card${i === activeIdx ? ' active' : ''}">`;
    html += `<div class="card-left">`;
    html += `<div class="card-header"><span class="card-name">${name}</span>`;
    html += p.isPlayer ? `<span class="badge-player">プレイヤー</span>` : `<span class="badge-cpu">CPU</span>`;
    html += `</div>`;
    html += `<div class="rank-label">職位</div>`;
    html += `<div class="rank-value">${RANKS[p.rank]}</div>`;
    html += rankStars(p.rank);
    html += `<div class="dep-label">配属先</div>`;
    html += `<div class="dep-value${p.depSpecial ? ' special' : ''}">${p.depSpecial ? '⭐ ' : ''}${p.dep}</div>`;
    html += `</div>`; // card-left
    html += `<div class="card-right">`;
    html += `<button class="btn-resume" onclick="showResume(${i})">📄 履歴書</button>`;
    html += `</div>`;
    html += `</div>`;
  });
  return html + '</div>';
}

function buildLog() {
  let html = '<div class="log-title">▼ 記録</div><div class="log-box">';
  html += S.log.length ? S.log.join('<br>') : '<span style="color:#445566">まだ記録はありません</span>';
  return html + '</div>';
}

function updateDialog() {
  const overlay = document.getElementById('dice-overlay');
  const isOpen = ['dep_rolling','promo_rolling','cpu_seq'].includes(S.phase) && !S.retired;
  overlay.style.display = isOpen ? 'flex' : 'none';
  if (!isOpen) return;

  // Label
  let labelText = '', labelClass = '';
  if      (S.phase === 'dep_rolling')   { labelText = '配属先サイコロ';            labelClass = ''; }
  else if (S.phase === 'promo_rolling') { labelText = '昇進サイコロ！';            labelClass = 'promo'; }
  else if (S.phase === 'cpu_seq')       { labelText = S.cpuLabel.replace('\n','<br>'); labelClass = 'cpu'; }
  const dlgLabel = document.getElementById('dlg-label');
  dlgLabel.innerHTML = labelText;
  dlgLabel.className = 'dlg-label' + (labelClass ? ' ' + labelClass : '');

  // Result (shown only after dice stops)
  const resultEl = document.getElementById('dlg-result');
  if (!S.diceVal) {
    resultEl.innerHTML = '';
  } else {
    let resHTML = `出た目: <strong>${S.diceVal}</strong>`;
    // 配属先を表示（配属ロールのとき）
    let dep = null, depSpecial = false;
    if (S.phase === 'dep_rolling') {
      dep = S.players[0].dep; depSpecial = S.players[0].depSpecial;
    } else if (S.phase === 'cpu_seq' && S.cpuRoll === 'dep') {
      const cpu = S.players[S.cpuIdx + 1];
      dep = cpu.dep; depSpecial = cpu.depSpecial;
    }
    if (dep) resHTML += `<br><span class="dlg-dep${depSpecial ? ' special' : ''}">📍 ${dep}</span>`;
    resultEl.innerHTML = resHTML;
  }

  // Stop button: only for player, only while spinning (diceVal is null)
  const showStop = S.diceVal === null && (S.phase === 'dep_rolling' || S.phase === 'promo_rolling');
  document.getElementById('dlg-btns').innerHTML = showStop
    ? `<button class="btn-stop" onclick="playerClickDice()">✋ 止める！</button>`
    : '';
}

function buildEnding() {
  const sorted = [...S.players].sort((a, b) => b.rank - a.rank);
  const medals = ['🥇','🥈','🥉'];
  let html = '<div class="ending"><h2>定年退職</h2>';
  html += '<div class="end-sub">全員が72歳を迎え、定年退職しました</div>';
  html += '<div class="result-list">';
  sorted.forEach((p, i) => {
    const name = p.customName !== null ? p.customName : p.name;
    html += `<div class="result-card${i === 0 ? ' winner' : ''}">`;
    html += `<div class="result-place">${medals[i]}</div>`;
    html += `<div class="result-info">`;
    html += `<div class="result-name">${name}</div>`;
    html += `<div class="result-rank">${RANKS[p.rank]}</div>`;
    html += `<div class="result-dep">最終配属: ${p.dep}</div>`;
    html += `</div></div>`;
  });
  html += '</div>';
  html += `<div class="final-rank-msg">あなたの最終職位: <strong>${RANKS[S.players[0].rank]}</strong></div>`;
  html += '<div class="resume-btns">';
  S.players.forEach((p, i) => {
    const name = p.customName !== null ? p.customName : p.name;
    html += `<button class="btn-resume-end" onclick="showResume(${i})">📄 ${name} の履歴書を見る</button>`;
  });
  html += '</div>';
  html += `<button class="btn-full btn-restart-full" onclick="restart()">もう一度プレイ</button>`;
  return html + '</div>';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initState();
render();
</script>
</body>
</html>
